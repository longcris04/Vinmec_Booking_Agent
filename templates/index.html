<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinmec ReAct Agent — Demo</title>
  <style>
    :root {
      --vin-blue: #00529c;
      --vin-blue-dark: #003e78;
      --bg: #f4f7fb;
      --user: #00529c;
      --bot: #ffffff;
      --danger: #c62828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--vin-blue);
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 18px; margin: 0; }
    header .meta { font-size: 12px; opacity: .85; }
    header .spacer { flex: 1; }
    header button {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    header button:hover { background: rgba(255,255,255,.28); }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }
    .msg { display: flex; margin-bottom: 14px; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,.08);
    }
    .msg.user .bubble { background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot .bubble { background: var(--bot); border-bottom-left-radius: 4px; }

    .map-card, .emergency-card {
      margin-top: 8px;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      max-width: 78%;
    }
    .map-card { background: #e8f0fe; border: 1px solid #c6dafc; }
    .map-card a {
      display: inline-block;
      margin-top: 6px;
      background: var(--vin-blue);
      color: #fff;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .emergency-card { background: #fdecea; border: 1px solid #f5c6c2; color: var(--danger); }
    .emergency-card h4 { margin: 0 0 6px; }
    .emergency-card ul { margin: 6px 0 0; padding-left: 20px; }

    details.trace {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      max-width: 78%;
    }
    details.trace summary { cursor: pointer; color: var(--vin-blue); }
    .step { border-left: 2px solid #d0d7e2; padding: 4px 0 4px 10px; margin: 6px 0; }
    .step .lbl { font-weight: 600; color: #333; }
    .metrics { font-size: 11px; color: #8a94a6; margin-top: 6px; max-width: 78%; }

    footer {
      border-top: 1px solid #e0e6ef;
      background: #fff;
      padding: 12px;
    }
    .composer {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }
    .composer textarea {
      flex: 1;
      resize: none;
      border: 1px solid #cdd6e4;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      height: 46px;
      max-height: 140px;
    }
    .composer button {
      background: var(--vin-blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 15px;
      cursor: pointer;
    }
    .composer button:disabled { background: #9bb4cf; cursor: not-allowed; }
    .hint { max-width: 860px; margin: 6px auto 0; font-size: 11px; color: #98a2b3; }
    .typing { font-style: italic; color: #98a2b3; }
  </style>
</head>
<body>
  <header>
    <h1>🏥 Vinmec ReAct Agent</h1>
    <span class="meta">model: {{ model }} · tools: {{ tools|length }}</span>
    <span class="spacer"></span>
    <span class="meta" id="geo-status">📍 đang xin vị trí…</span>
    <button id="reset-btn">Cuộc trò chuyện mới</button>
  </header>

  <main id="chat">
    <div class="msg bot">
      <div class="bubble">Xin chào! Tôi là trợ lý ảo Vinmec. Bạn cần đặt lịch khám, hỏi giá dịch vụ, tìm cơ sở gần nhất hay cần hỗ trợ khẩn cấp? 😊</div>
    </div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" placeholder="Nhập câu hỏi… (Enter để gửi, Shift+Enter xuống dòng)" maxlength="500"></textarea>
      <button id="send-btn">Gửi</button>
    </div>
    <div class="hint">Demo lab — dữ liệu Vinmec là mock. Không dùng cho cấp cứu thật: khi nguy hiểm hãy gọi 115.</div>
  </footer>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const resetBtn = document.getElementById("reset-btn");
    const geoStatus = document.getElementById("geo-status");

    let userLat = null, userLon = null;

    // Xin vị trí GPS từ trình duyệt (tùy chọn — tăng độ chính xác tìm cơ sở/chỉ đường)
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
          geoStatus.textContent = "📍 đã có vị trí";
        },
        () => { geoStatus.textContent = "📍 không có vị trí (dùng IP)"; },
        { timeout: 8000 }
      );
    } else {
      geoStatus.textContent = "📍 trình duyệt không hỗ trợ GPS";
    }

    function el(tag, cls, html) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html !== undefined) e.innerHTML = html;
      return e;
    }
    function escapeHtml(s) {
      return (s || "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }
    function scrollDown() { chat.scrollTop = chat.scrollHeight; }

    function addUser(text) {
      const wrap = el("div", "msg user");
      wrap.appendChild(el("div", "bubble", escapeHtml(text)));
      chat.appendChild(wrap);
      scrollDown();
    }

    function addBot(data) {
      const wrap = el("div", "msg bot");
      const inner = el("div");
      inner.appendChild(el("div", "bubble", escapeHtml(data.answer)));

      // Cấp cứu
      if (data.emergency) {
        const e = data.emergency;
        let html = `<h4>🚨 Cấp cứu</h4>Gọi ngay <b>${escapeHtml(e.national || "115")}</b>`;
        if (e.facility) html += ` · Cơ sở gần bạn: ${escapeHtml(e.facility)} (~${e.distance_km} km)`;
        else if (e.hotline) html += ` · Hotline Vinmec: ${escapeHtml(e.hotline)}`;
        if (e.first_aid && e.first_aid.length) {
          html += "<ul>" + e.first_aid.map((s) => `<li>${escapeHtml(s)}</li>`).join("") + "</ul>";
        }
        inner.appendChild(el("div", "emergency-card", html));
      }

      // Bản đồ / chỉ đường
      if (data.map) {
        const m = data.map;
        const html = `🗺️ <b>${escapeHtml(m.label)}</b><br>${escapeHtml(m.address)} · cách ~${m.distance_km} km<br>`
          + `<a href="${m.url}" target="_blank" rel="noopener">Chỉ đường Google Maps</a>`;
        inner.appendChild(el("div", "map-card", html));
      }

      // Trace ReAct (ẩn trong details)
      if (data.trace && data.trace.length) {
        const det = el("details", "trace");
        det.appendChild(el("summary", null, `🔎 Xem suy luận (${data.trace.length} bước)`));
        data.trace.forEach((s) => {
          let h = "";
          if (s.thought) h += `<span class="lbl">Thought:</span> ${escapeHtml(s.thought)}<br>`;
          if (s.action) h += `<span class="lbl">Action:</span> ${escapeHtml(s.action)}<br>`;
          if (s.observation) h += `<span class="lbl">Observation:</span> ${escapeHtml(s.observation)}`;
          if (h) det.appendChild(el("div", "step", h));
        });
        inner.appendChild(det);
      }

      // Metrics
      if (data.metrics) {
        const mt = data.metrics;
        inner.appendChild(el("div", "metrics",
          `⚙️ ${mt.steps} bước · ${mt.tokens} tokens · ${mt.latency_ms} ms · ~$${mt.cost}`));
      }

      wrap.appendChild(inner);
      chat.appendChild(wrap);
      scrollDown();
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      sendBtn.textContent = busy ? "…" : "Gửi";
    }

    let typingNode = null;
    function showTyping() {
      typingNode = el("div", "msg bot");
      typingNode.appendChild(el("div", "bubble typing", "Trợ lý đang suy nghĩ…"));
      chat.appendChild(typingNode);
      scrollDown();
    }
    function hideTyping() {
      if (typingNode) { typingNode.remove(); typingNode = null; }
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      addUser(text);
      input.value = "";
      setBusy(true);
      showTyping();
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, lat: userLat, lon: userLon }),
        });
        const data = await res.json();
        hideTyping();
        if (data.error) {
          addBot({ answer: data.error });
        } else {
          addBot(data);
        }
      } catch (err) {
        hideTyping();
        addBot({ answer: "Không kết nối được tới máy chủ. Vui lòng thử lại." });
      } finally {
        setBusy(false);
        input.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    resetBtn.addEventListener("click", async () => {
      await fetch("/api/reset", { method: "POST" });
      chat.innerHTML = "";
      addBot({ answer: "Đã bắt đầu cuộc trò chuyện mới. Tôi có thể giúp gì cho bạn? 😊" });
    });
  </script>
</body>
</html>
